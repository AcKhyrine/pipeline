name: Promote Proxies Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, closed]

# Required to allow the bot to push promote.txt back to the repository
permissions:
  contents: write

jobs:
  validate_proxies:
    # Run only on open PRs (when NOT merged and NOT closed)
    if: github.event.pull_request.merged != true && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Validate Proxies
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate proxies exist
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BASE_DIR="scr/main/apiproxies"
          echo "PR Title: $PR_TITLE"

          RAW=$(echo "$PR_TITLE" | sed -n 's/.*[Pp]romote [Pp]roxies:[[:space:]]*//p')
          if [ -z "$RAW" ]; then
            echo "❌ No proxies found in PR title."
            exit 1
          fi

          PROXIES=$(echo "$RAW" | tr ',' ' ' | xargs)
          MISSING=0

          for proxy in $PROXIES; do
            FOUND=0
            # Use find to handle potential case sensitivity or path issues
            if [ -d "$BASE_DIR" ]; then
                for dir in "$BASE_DIR"/*; do
                DIR_NAME=$(basename "$dir" | tr '[:upper:]' '[:lower:]')
                PROXY_LOWER=$(echo "$proxy" | tr '[:upper:]' '[:lower:]')
                if [ "$DIR_NAME" = "$PROXY_LOWER" ]; then
                    FOUND=1
                    break
                fi
                done
            fi
            
            if [ "$FOUND" -eq 0 ]; then
              echo "❌ Proxy '$proxy' does NOT exist in $BASE_DIR"
              MISSING=1
            else
              echo "✅ Found proxy: $proxy"
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi

  create_promote_file:
    # Run only when the PR is closed AND it was merged
    if: github.event.pull_request.merged == true && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Create/Update promote.txt After Merge
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          # Checkout the branch the PR was merged into (e.g., main)
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Extract Proxies and Create promote.txt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          BASE_DIR="scr/main/apiproxies"
          RAW=$(echo "$PR_TITLE" | sed -n 's/.*[Pp]romote [Pp]roxies:[[:space:]]*//p')
          
          if [ -z "$RAW" ]; then
            echo "❌ No proxies found in PR title, skipping."
            exit 0
          fi

          # Save cleaned comma-separated list to promote.txt
          echo "$RAW" | xargs > promote.txt
          echo "✅ promote.txt updated with: $(cat promote.txt)"

      - name: Commit and Push promote.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add promote.txt
          
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No changes to promote.txt, skipping push."
          else
            # [skip ci] prevents this commit from triggering another workflow run
            git commit -m "chore: update promote.txt from PR title [skip ci]"
            git push origin ${{ github.event.pull_request.base.ref }}
          fi
