name: "Path-Based Proxy Promotion"

on:
  pull_request:
    types: [closed]
    branches:
      - uat
      - main

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: fetch all history to compare changes

      - name: Get Changed Proxies
        id: changed-proxies
        uses: tj-actions/changed-files@v44
        with:
          # This looks specifically for changes in your proxy folders
          dir_names: true
          dir_names_max_depth: 4
          files: src/main/apiproxies/**

      - name: Determine Environments
        run: |
          if [ "${{ github.base_ref }}" == "uat" ]; then
            echo "SRC=sit" >> $GITHUB_ENV
            echo "DEST=uat" >> $GITHUB_ENV
          else
            echo "SRC=uat" >> $GITHUB_ENV
            echo "DEST=prod" >> $GITHUB_ENV
          fi

      - name: Promote Detected Proxies
        if: steps.changed-proxies.outputs.any_changed == 'true'
        run: |
          # The Action returns a space-separated list of changed folders
          # e.g. "src/main/apiproxies/test-proxy-1 src/main/apiproxies/test-proxy-2"
          
          for FOLDER in ${{ steps.changed-proxies.outputs.all_changed_files }}; do
            # Extract just the proxy name from the path
            PROXY_NAME=$(basename $FOLDER)
            
            echo "------------------------------------------"
            echo "Detected change in: $PROXY_NAME"
            echo "🛠 Promoting $PROXY_NAME from $SRC to $DEST"
            
            # YOUR LOGIC HERE:
            # 1. Get highest revision of $PROXY_NAME in $SRC
            # 2. Deploy that revision to $DEST
            
            echo "✅ $PROXY_NAME Promotion Complete!"
          done