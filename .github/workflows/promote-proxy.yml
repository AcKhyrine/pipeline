name: Promote Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set env variables
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV

    - name: Parse and Clean Proxies
      run: |
        BODY="${{ github.event.pull_request.body }}"
        # Extract proxies, remove \r, remove commas, trim whitespace
        PROXIES=$(echo "$BODY" | sed -n '/promote:/,$p' | sed 's/promote://g' | tr -d '\r' | tr ',' ' ' | xargs)
        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: exit 0

    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        echo "PROMO_BRANCH=$PROMO_BRANCH" >> $GITHUB_ENV
        git fetch origin $TARGET_BRANCH
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    - name: Copy selected proxies via Archive
      run: |
        # Ensure we have the latest from source
        git fetch origin $SOURCE_BRANCH
        
        mkdir -p src/main/apiproxies/
        
        for proxy in $PROXIES; do
          CLEAN_PROXY=$(echo $proxy | xargs)
          echo "Processing: $CLEAN_PROXY"
          
          # This pulls the folder directly from the remote branch as a tarball and extracts it
          # This bypasses the 'pathspec' index error entirely
          git archive --format=tar origin/$SOURCE_BRANCH "src/main/apiproxies/$CLEAN_PROXY" | tar -xf - || echo "::warning::Proxy $CLEAN_PROXY not found in $SOURCE_BRANCH"
        done

    - name: Commit and Push
      run: |
        git add src/main/apiproxies/
        if ! git diff --cached --quiet; then
          git commit -m "Promote proxies: $PROXIES"
          git push origin $PROMO_BRANCH --force
        else
          echo "No changes detected. Ensure the proxy folder exists in $SOURCE_BRANCH and the path is correct."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}