name: Promote Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set env variables
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV

    - name: Parse and Clean Proxies
      id: parse
      run: |
        BODY="${{ github.event.pull_request.body }}"
        
        # 1. Extract lines after 'promote:'
        # 2. Remove 'promote:' text
        # 3. Remove carriage returns (\r) - IMPORTANT
        # 4. Replace commas/newlines with spaces
        # 5. Trim leading/trailing whitespace
        PROXIES=$(echo "$BODY" | sed -n '/promote:/,$p' | sed 's/promote://g' | tr -d '\r' | tr ',\n' ' ' | xargs)

        echo "PROXIES=$PROXIES"
        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: |
        echo "No proxies specified. Exiting."
        exit 0

    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    - name: Fetch branches
      run: |
        git fetch origin $SOURCE_BRANCH:$SOURCE_BRANCH
        git fetch origin $TARGET_BRANCH:$TARGET_BRANCH

    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        echo "PROMO_BRANCH=$PROMO_BRANCH" >> $GITHUB_ENV
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    - name: Copy selected proxies
      run: |
        mkdir -p src/main/apiproxies/
        for proxy in $PROXIES; do
          # Remove any potential hidden whitespace again just to be safe
          CLEAN_PROXY=$(echo $proxy | xargs)
          PATH_TO_PROXY="src/main/apiproxies/$CLEAN_PROXY"
          
          echo "Checking for: $PATH_TO_PROXY in origin/$SOURCE_BRANCH"
          
          # Use origin reference to ensure we see the remote files
          git checkout origin/$SOURCE_BRANCH -- "$PATH_TO_PROXY" || echo "::warning::Proxy $CLEAN_PROXY not found"
        done

    - name: Commit and Push
      run: |
        git add src/main/apiproxies/
        if ! git diff --cached --quiet; then
          git commit -m "Promote proxies: $PROXIES"
          git push origin $PROMO_BRANCH --force
        else
          echo "No changes to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}