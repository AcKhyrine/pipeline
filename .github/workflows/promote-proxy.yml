name: Promote Selected Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest

    steps:
    # ------------------------
    # 1. Checkout repository
    # ------------------------
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # full history
        ref: ${{ github.head_ref }}  # PR source branch

    # ------------------------
    # 2. Set environment variables
    # ------------------------
    - name: Set env vars
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
        echo "PR_BODY<<EOF" >> $GITHUB_ENV
        echo "${{ github.event.pull_request.body }}" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # ------------------------
    # 3. Fetch source branch (e.g., SIT) explicitly
    # ------------------------
    - name: Fetch source branch
      run: |
        echo "Fetching branch $SOURCE_BRANCH..."
        git fetch origin $SOURCE_BRANCH:$SOURCE_BRANCH

    # ------------------------
    # 4. Debug: list proxies in source branch
    # ------------------------
    - name: List proxies in source branch
      run: |
        echo "Listing proxies in $SOURCE_BRANCH..."
        git ls-tree --name-only -r $SOURCE_BRANCH | grep '^src/main/apiproxies/' || echo "No proxies found"

    # ------------------------
    # 5. Parse proxies from PR description
    # ------------------------
    - name: Parse proxies
      run: |
        PROXIES=$(echo "$PR_BODY" | sed -n '/promote:/,$p' | tail -n +2 | grep -oE '[a-zA-Z0-9_-]+' | tr '\n' ' ')
        if [ -z "$PROXIES" ]; then
          # fallback: single-line
          PROXIES=$(echo "$PR_BODY" | sed -n 's/^promote:[ ]*\(.*\)/\1/p')
        fi
        PROXIES=$(echo $PROXIES | xargs)
        echo "PROXIES=$PROXIES"
        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    # ------------------------
    # 6. Exit if no proxies specified
    # ------------------------
    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: |
        echo "No proxies specified. Exiting."
        exit 0

    # ------------------------
    # 7. Configure Git
    # ------------------------
    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    # ------------------------
    # 8. Create promotion branch from target
    # ------------------------
    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        echo "Promotion branch: $PROMO_BRANCH"
        git fetch origin $TARGET_BRANCH
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    # ------------------------
    # 9. Copy selected proxies from source branch
    # ------------------------
    - name: Copy selected proxies
      run: |
        for proxy in $PROXIES; do
          echo "Copying proxy: $proxy from $SOURCE_BRANCH..."
          if git ls-tree -r $SOURCE_BRANCH --name-only | grep -q "src/main/apiproxies/$proxy"; then
            git checkout $SOURCE_BRANCH -- "src/main/apiproxies/$proxy"
            echo "✅ Copied $proxy successfully"
          else
            echo "❌ Proxy $proxy not found in $SOURCE_BRANCH"
          fi
        done

    # ------------------------
    # 10. Commit promotion changes
    # ------------------------
    - name: Commit promotion changes
      run: |
        if git diff --quiet; then
          echo "No changes to commit."
        else
          git add src/main/apiproxies/*
          git commit -m "Promote proxies: $PROXIES from $SOURCE_BRANCH → $TARGET_BRANCH"
        fi

    # ------------------------
    # 11. Push promotion branch
    # ------------------------
    - name: Push promotion branch
      uses: ad-m/github-push-action@v0.6.0
      with:
        branch: promotion/${{ env.SOURCE_BRANCH }}-${{ env.TARGET_BRANCH }}
        github_token: ${{ secrets.GITHUB_TOKEN }}