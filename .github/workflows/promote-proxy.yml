name: Promote Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # 1. Checkout repo
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # fetch all history and branches

    # ----------------------------------------
    # 2. Set basic environment variables
    # ----------------------------------------
    - name: Set env variables
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
        echo "PR_BODY<<EOF" >> $GITHUB_ENV
        echo "${{ github.event.pull_request.body }}" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # ----------------------------------------
    # 3. Parse proxies from PR description
    # ----------------------------------------
    - name: Parse proxies from PR description
      id: parse
      run: |
        # Extract lines after 'promote:' (multi-line support)
        PROXIES=$(echo "${{ github.event.pull_request.body }}" | sed -n '/promote:/,$p' | tail -n +2 | grep -oE '[a-zA-Z0-9_-]+' | tr '\n' ' ')

        # Fallback: single-line 'promote: proxy-name'
        if [ -z "$PROXIES" ]; then
          PROXIES=$(echo "${{ github.event.pull_request.body }}" | sed -n 's/^promote:[ ]*\(.*\)/\1/p')
        fi

        # Trim spaces
        PROXIES=$(echo $PROXIES | xargs)

        echo "PROXIES=$PROXIES"
        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    # ----------------------------------------
    # 4. Exit if no proxies specified
    # ----------------------------------------
    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: |
        echo "No proxies specified in PR description. Exiting."
        exit 0

    # ----------------------------------------
    # 5. Configure Git
    # ----------------------------------------
    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    # ----------------------------------------
    # 6. Fetch source branch (SIT/PR branch)
    # ----------------------------------------
    - name: Fetch source branch
      run: git fetch origin $SOURCE_BRANCH:$SOURCE_BRANCH

    # ----------------------------------------
    # 7. Create promotion branch from target branch
    # ----------------------------------------
    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        echo "Promotion branch: $PROMO_BRANCH"
        git fetch origin $TARGET_BRANCH
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    # ----------------------------------------
    # 8. Copy only selected proxies from source branch
    # ----------------------------------------
    - name: Copy selected proxies
      run: |
        for proxy in $PROXIES; do
          echo "Copying proxy: $proxy from $SOURCE_BRANCH"

          # Fetch the proxy folder from the source branch into a temp directory
          mkdir -p /tmp/source_branch
          git --work-tree=/tmp/source_branch checkout $SOURCE_BRANCH -- src/main/apiproxies/$proxy || echo "Proxy $proxy not found in source branch"

          # Copy into promotion branch
          if [ -d "/tmp/source_branch/src/main/apiproxies/$proxy" ]; then
            cp -r /tmp/source_branch/src/main/apiproxies/$proxy src/main/apiproxies/
          fi
        done

    # ----------------------------------------
    # 9. Commit promotion changes if any
    # ----------------------------------------
    - name: Commit promotion changes
      run: |
        if ls src/main/apiproxies/* 1> /dev/null 2>&1; then
          git add src/main/apiproxies/*
          git commit -m "Promote proxies: $PROXIES from $SOURCE_BRANCH → $TARGET_BRANCH" || echo "No changes to commit"
        else
          echo "No proxies copied. Skipping commit."
        fi

    # ----------------------------------------
    # 10. Push promotion branch
    # ----------------------------------------
    - name: Push promotion branch
      uses: ad-m/github-push-action@v0.6.0
      with:
        branch: promotion/${{ env.SOURCE_BRANCH }}-${{ env.TARGET_BRANCH }}
        github_token: ${{ secrets.GITHUB_TOKEN }}