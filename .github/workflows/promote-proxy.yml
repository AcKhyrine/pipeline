name: Promote Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # 1. Checkout repo
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Needed to fetch all history

    # ----------------------------------------
    # 2. Set basic variables
    # ----------------------------------------
    - name: Set environment variables
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
        echo "PR_BODY<<EOF" >> $GITHUB_ENV
        echo "${{ github.event.pull_request.body }}" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # ----------------------------------------
    # 3. Parse proxies from PR description
    # ----------------------------------------
    - name: Parse proxies from PR description
      id: parse
      run: |
        # 1’ĖÅŌāŻ Extract everything after 'promote:'
        PROXIES=$(echo "${{ github.event.pull_request.body }}" | \
          sed -n '/promote:/,$p' | tail -n +2 | grep -oE '[a-zA-Z0-9_-]+' | tr '\n' ' ')

        # 2’ĖÅŌāŻ Fallback: single line promote: proxy-name
        if [ -z "$PROXIES" ]; then
          PROXIES=$(echo "${{ github.event.pull_request.body }}" | sed -n 's/^promote:[ ]*\(.*\)/\1/p')
        fi

        # Trim spaces
        PROXIES=$(echo $PROXIES | xargs)

        echo "PROXIES=$PROXIES"
        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    # ----------------------------------------
    # 4. Exit if no proxies specified
    # ----------------------------------------
    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: |
        echo "No proxies specified in PR description. Exiting."
        exit 0

    # ----------------------------------------
    # 5. Configure Git
    # ----------------------------------------
    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    # ----------------------------------------
    # 6. Create temporary promotion branch
    # ----------------------------------------
    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        echo "Promotion branch: $PROMO_BRANCH"
        git fetch origin $TARGET_BRANCH
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    # ----------------------------------------
    # 7. Copy selected proxies
    # ----------------------------------------
    - name: Copy selected proxies
      run: |
        for proxy in $PROXIES; do
          echo "Copying proxy: $proxy from $SOURCE_BRANCH"
          git checkout $SOURCE_BRANCH -- src/main/apiproxies/$proxy || echo "Proxy $proxy not found"
        done

    # ----------------------------------------
    # 8. Commit promotion changes
    # ----------------------------------------
    - name: Commit promotion changes
      run: |
        if ls src/main/apiproxies/* 1> /dev/null 2>&1; then
          git add src/main/apiproxies/*
          git commit -m "Promote proxies: $PROXIES from $SOURCE_BRANCH ŌåÆ $TARGET_BRANCH" || echo "No changes to commit"
        else
          echo "No proxies copied. Skipping commit."
        fi

    # ----------------------------------------
    # 9. Push promotion branch
    # ----------------------------------------
    - name: Push promotion branch
      uses: ad-m/github-push-action@v0.6.0
      with:
        branch: promotion/${{ env.SOURCE_BRANCH }}-${{ env.TARGET_BRANCH }}
        github_token: ${{ secrets.GITHUB_TOKEN }}