name: Promote Proxies

on:
  pull_request:
    types: [opened, edited]

jobs:
  selective-promotion:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set env variables
      run: |
        echo "SOURCE_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV

    - name: Parse proxies from PR description
      id: parse
      run: |
        # Improved parsing to handle both multi-line and single line
        BODY="${{ github.event.pull_request.body }}"
        PROXIES=$(echo "$BODY" | sed -n '/promote:/,$p' | tail -n +2 | grep -oE '[a-zA-Z0-9_-]+' | tr '\n' ' ')
        
        if [ -z "$PROXIES" ]; then
          PROXIES=$(echo "$BODY" | grep "promote:" | sed 's/promote://g' | xargs)
        fi

        echo "PROXIES=$PROXIES" >> $GITHUB_ENV

    - name: Exit if no proxies
      if: env.PROXIES == ''
      run: |
        echo "No proxies specified. Exiting."
        exit 0

    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"

    - name: Create promotion branch
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        # Start fresh from the target branch (e.g., main or prod)
        git checkout -B $PROMO_BRANCH origin/$TARGET_BRANCH

    - name: Copy selected proxies
      run: |
        for proxy in $PROXIES; do
          PATH_TO_PROXY="src/main/apiproxies/$proxy"
          echo "Attempting to copy: $PATH_TO_PROXY from $SOURCE_BRANCH"

          # Use git restore or checkout directly from the source branch
          # This pulls the folder directly into your current working directory
          git checkout "origin/$SOURCE_BRANCH" -- "$PATH_TO_PROXY" || echo "Proxy $proxy not found in $SOURCE_BRANCH"
        done

    - name: Commit and Push
      run: |
        PROMO_BRANCH="promotion/${SOURCE_BRANCH}-${TARGET_BRANCH}"
        git add src/main/apiproxies/
        
        # Only commit and push if there are actual staged changes
        if ! git diff --cached --quiet; then
          git commit -m "Promote proxies: $PROXIES"
          git push origin $PROMO_BRANCH --force
        else
          echo "No changes detected. Skipping push."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}